<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oyasumi 登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,500,0,0&family=Roboto+Flex:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="bg-layer">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="orb orb-c"></div>
  </div>

  <main class="layout login-layout">
    <section class="card login-card">
      <div class="section-title">
        <span class="material-symbols-rounded">shield_lock</span>
        <h2>登录 Oyasumi WebUI</h2>
      </div>
      <p class="section-desc">
        请输入插件配置项 <code>standalone_webui_token</code> 进行登录。
      </p>

      <form id="login_form" class="fields login-fields">
        <label class="field">
          <span>访问令牌</span>
          <input
            id="login_token"
            type="password"
            placeholder="请输入访问令牌（若配置为空可留空）"
            autocomplete="current-password"
          />
        </label>
        <button id="login_btn" type="submit" class="btn btn-filled">
          <span class="material-symbols-rounded">login</span>
          登录
        </button>
      </form>

      <p id="login_message" class="login-message"></p>
    </section>
  </main>

  <script src="/static/login.js"></script>
</body>
</html>
