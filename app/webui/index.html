<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oyasumi 独立看板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,500,0,0&family=Roboto+Flex:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="bg-layer">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="orb orb-c"></div>
  </div>

  <main class="layout">
    <header class="topbar card">
      <div class="brand">
        <p class="eyebrow">Oyasumi Plugin</p>
        <h1>独立睡眠看板</h1>
      </div>
      <div class="topbar-actions">
        <div class="chip" id="status_chip">
          <span class="material-symbols-rounded">monitoring</span>
          <span id="status_text">就绪</span>
        </div>
        <button id="refresh_btn" class="btn btn-filled">
          <span class="material-symbols-rounded">refresh</span>
          刷新
        </button>
      </div>
    </header>

    <section class="card controls">
      <div class="section-title">
        <span class="material-symbols-rounded">tune</span>
        <h2>筛选条件</h2>
      </div>
      <div class="fields">
        <label class="field">
          <span>访问令牌（可选）</span>
          <input id="token" type="password" placeholder="与 standalone_webui_token 一致" autocomplete="off" />
        </label>
        <label class="field">
          <span>用户</span>
          <select id="user_id">
            <option value="">全部用户</option>
          </select>
        </label>
        <label class="field">
          <span>看板天数</span>
          <input id="days" type="number" min="1" max="90" value="7" />
        </label>
        <label class="field">
          <span>会话条数</span>
          <input id="limit" type="number" min="1" max="200" value="20" />
        </label>
        <label class="field">
          <span>开始日期</span>
          <input id="start_date" type="date" />
        </label>
        <label class="field">
          <span>结束日期</span>
          <input id="end_date" type="date" />
        </label>
      </div>
      <div class="actions">
        <button id="analysis_btn" class="btn btn-tonal">
          <span class="material-symbols-rounded">auto_awesome</span>
          生成分析
        </button>
      </div>
    </section>

    <section class="metrics" id="metrics"></section>

    <section class="visual-grid">
      <article class="card trend-card">
        <div class="section-title">
          <span class="material-symbols-rounded">show_chart</span>
          <h2>睡眠趋势图</h2>
        </div>
        <p class="section-desc">按统计日展示睡眠分钟变化，帮助发现作息波动</p>
        <div class="trend-wrap">
          <svg id="trend_svg" viewBox="0 0 860 280" preserveAspectRatio="none"></svg>
        </div>
        <div class="daily-list" id="daily_list"></div>
      </article>

      <article class="card composition-card">
        <div class="section-title">
          <span class="material-symbols-rounded">donut_large</span>
          <h2>会话构成</h2>
        </div>
        <div class="composition-wrap">
          <div class="donut" id="session_donut">
            <div class="donut-inner">
              <div class="donut-value" id="donut_total">0</div>
              <div class="donut-label">总会话</div>
            </div>
          </div>
          <div class="legend" id="donut_legend"></div>
        </div>
        <div class="insight-box" id="insight_box">
          <p>等待数据加载…</p>
        </div>
      </article>
    </section>

    <section class="card">
      <div class="section-title">
        <span class="material-symbols-rounded">neurology</span>
        <h2>个性化分析</h2>
      </div>
      <div id="analysis_md" class="analysis-markdown">
        <p class="md-placeholder">点击“生成分析”后显示内容</p>
      </div>
    </section>

    <section class="card">
      <div class="section-title">
        <span class="material-symbols-rounded">list_alt</span>
        <h2>最近会话</h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>用户</th>
              <th>状态</th>
              <th>入睡</th>
              <th>醒来</th>
              <th>时长</th>
              <th>来源</th>
            </tr>
          </thead>
          <tbody id="sessions_tbody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <div class="section-title">
        <span class="material-symbols-rounded">data_object</span>
        <h2>最近快照</h2>
      </div>
      <pre id="snapshot" class="snapshot">{}</pre>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="/static/app.js"></script>
</body>
</html>
